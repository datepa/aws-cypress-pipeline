version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing Linux system packages required by headless Cypress browsers..."
      - apt-get update && apt-get install -y libgtk2.0-0 libgtk-3-0 libgbm-dev libnotify-dev libnss3 libxss1 libasound2 libxtst6 xauth xvfb
      - echo "Installing project dependencies..."
      - npm ci

  build:
    commands:
      - echo "Executing Cypress Tests Headlessly against Sauce Demo..."
      - npx cypress run --browser chrome

artifacts:
  files:
    - 'cypress/screenshots/**/*'